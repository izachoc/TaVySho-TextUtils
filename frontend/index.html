<!doctype html>
<html lang="uk">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>TaVySho TextUtils</title>

        <link rel="icon" href="assets/logo.png" type="image/png" />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Quicksand:wght@700&display=swap"
            rel="stylesheet"
        />

        <link rel="stylesheet" href="style.css" />
    </head>
    <body>
        <div class="app-card">
            <div class="character-wrapper">
                <img
                    src="assets/rohan.png"
                    alt="Character"
                    class="character-img"
                />
            </div>

            <header>
                <a href="#" class="logo-area">
                    <img src="assets/logo.png" alt="Logo" class="main-logo" />
                    <span class="logo-text">TaVySho TextUtils</span>
                </a>
                <button class="theme-btn" id="themeToggle" title="Змінити тему">
                    <img src="assets/moon.svg" alt="Light" class="icon-light" />
                    <img src="assets/sun.svg" alt="Dark" class="icon-dark" />
                </button>
            </header>

            <div class="main-layout">
                <aside class="sidebar">
                    <div class="stat-card">
                        <div class="stat-title">Деталізація</div>
                        <div class="stat-row">
                            Речень:
                            <span class="stat-value" id="sentenceCount">0</span>
                        </div>
                        <div class="stat-row">
                            Знаків:
                            <span class="stat-value" id="punctCount">0</span>
                        </div>
                    </div>

                    <div class="stat-card">
                        <div class="stat-title">Топ 3 слова</div>
                        <ul class="top-words-list" id="topWords">
                            <li
                                style="
                                    justify-content: center;
                                    color: var(--text-muted);
                                "
                            >
                                Немає тексту
                            </li>
                        </ul>
                    </div>
                </aside>

                <section class="editor-section">
                    <div class="toolbar">
                        <div class="search-widget" id="searchWidget">
                            <button
                                class="icon-btn toggle-expand"
                                id="toggleExpand"
                                title="Розгорнути"
                            >
                                <svg viewBox="0 0 24 24">
                                    <path
                                        d="M8.59 16.59L13.17 12 8.59 7.41 10 6l6 6-6 6-1.41-1.41z"
                                    />
                                </svg>
                            </button>
                            <div class="input-wrapper">
                                <input
                                    type="text"
                                    class="find-input"
                                    id="findInput"
                                    placeholder="Знайти..."
                                />
                                <span class="find-count" id="findCount"
                                    >0/0</span
                                >
                            </div>
                            <button
                                class="icon-btn"
                                id="prevBtn"
                                title="Попередній"
                            >
                                <svg viewBox="0 0 24 24">
                                    <path
                                        d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"
                                    />
                                </svg>
                            </button>
                            <button
                                class="icon-btn"
                                id="nextBtn"
                                title="Наступний"
                            >
                                <svg viewBox="0 0 24 24">
                                    <path
                                        d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"
                                    />
                                </svg>
                            </button>

                            <div class="replace-row">
                                <div style="width: 36px"></div>
                                <div class="input-wrapper">
                                    <input
                                        type="text"
                                        class="find-input"
                                        id="replaceInput"
                                        placeholder="Замінити на..."
                                    />
                                </div>
                                <button
                                    class="icon-btn"
                                    id="replaceBtn"
                                    title="Замінити поточне"
                                >
                                    <svg viewBox="0 0 24 24">
                                        <path
                                            d="M12 6v3l4-4-4-4v3c-4.42 0-8 3.58-8 8 0 1.57.46 3.03 1.24 4.26L6.7 14.8c-.45-.83-.7-1.79-.7-2.8 0-3.31 2.69-6 6-6zm6.76 1.74L17.3 9.2c.44.84.7 1.79.7 2.8 0 3.31-2.69 6-6 6v-3l-4 4 4 4v-3c4.42 0 8-3.58 8-8 0-1.57-.46-3.03-1.24-4.26z"
                                        />
                                    </svg>
                                </button>
                                <button
                                    class="icon-btn"
                                    id="replaceAllBtn"
                                    title="Замінити всі"
                                >
                                    <svg viewBox="0 0 24 24">
                                        <path
                                            d="M12 4V1L8 5l4 4V6c3.31 0 6 2.69 6 6 0 1.01-.25 1.97-.7 2.8l1.46 1.46C21.54 15.03 22 13.57 22 12c0-4.42-3.58-8-8-8zm0 14c-3.31 0-6-2.69-6-6 0-1.01.25-1.97.7-2.8L5.24 7.74C4.46 8.97 4 10.43 4 12c0 4.42 3.58 8 8 8v3l4-4-4-4v3z"
                                        />
                                    </svg>
                                </button>
                            </div>
                        </div>

                        <div class="stats">
                            <div>Слів: <span id="wordCount">0</span></div>
                            <div>Символів: <span id="charCount">0</span></div>
                        </div>
                    </div>

                    <div class="editor-row">
                        <div class="textarea-wrapper">
                            <div id="backdrop" class="backdrop"></div>
                            <textarea
                                class="main-textarea"
                                id="mainText"
                                placeholder="Вставте текст сюди..."
                            ></textarea>
                        </div>

                        <div class="vertical-actions">
                            <button class="action-btn" id="copyBtn">
                                <svg viewBox="0 0 24 24">
                                    <path
                                        d="M16 1H4C2.9 1 2 1.9 2 3v14h2V3h12V1zm3 4H8C6.9 5 6 5.9 6 7v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"
                                    />
                                </svg>
                                Копіювати
                            </button>
                            <button class="action-btn" id="pasteBtn">
                                <svg viewBox="0 0 24 24">
                                    <path
                                        d="M19 2h-4.18C14.4.84 13.3 0 12 0c-1.3 0-2.4.84-2.82 2H5c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-7 0c.55 0 1 .45 1 1s-.45 1-1 1-1-.45-1-1 .45-1 1-1zm7 18H5V4h2v3h10V4h2v16z"
                                    />
                                </svg>
                                Вставити
                            </button>
                            <button class="action-btn" id="clearBtn">
                                <svg viewBox="0 0 24 24">
                                    <path
                                        d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"
                                    />
                                </svg>
                                Очистити
                            </button>
                            <input type="file" id="fileInput" accept=".txt" />
                            <button class="action-btn" id="importBtn">
                                <svg viewBox="0 0 24 24">
                                    <path
                                        d="M9 16h6v-6h4l-7-7-7 7h4zm-4 2h14v2H5z"
                                    />
                                </svg>
                                Імпорт
                            </button>
                            <button class="action-btn" id="analyzeBtn">
                                <svg viewBox="0 0 24 24">
                                    <path
                                        d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zM9 17H7v-7h2v7zm4 0h-2V7h2v10zm4 0h-2v-4h2v4z"
                                    />
                                </svg>
                                Аналіз
                            </button>
                        </div>
                    </div>
                </section>
            </div>

            <footer>Designed by Sea of Seal & izachoc</footer>
        </div>

        <script src="script.js"></script>
    </body>
</html>
